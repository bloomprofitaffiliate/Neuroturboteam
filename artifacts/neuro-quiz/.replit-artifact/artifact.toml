kind = "web"
previewPath = "/"
title = "Neuro-Turbo Brain Quiz"
version = "1.0.0"
id = "artifacts/neuro-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19205

[services.development]
run = "pnpm --filter @workspace/neuro-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neuro-quiz", "run", "build" ]
publicDir = "artifacts/neuro-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19205"
BASE_PATH = "/"
